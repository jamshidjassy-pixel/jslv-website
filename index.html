            <a href="https://wa.me/918301013842?text=Hi%20JSLV,%20I'd%20like%20to%20discuss%20remote%20support%20for%20${currentCountry.toUpperCase()}" target="_blank" class="whatsapp-btn" style="display: inline-flex; width: auto; padding: 0.8rem 2rem;">📱 Or chat on WhatsApp</a>
          </div>
        </div>
      </section>
    `;
  }

  function renderAbout() {
    return aboutContent;
  }

  function renderBlog() {
    return blogContent;
  }

  function render() {
    const main = document.getElementById('mainContent');
    if (currentView === 'home') {
      main.innerHTML = renderHome();
      const freeTrialBtn = document.getElementById('freeTrialBtn');
      const quoteBtn = document.getElementById('quoteBtn');
      if (freeTrialBtn) {
        freeTrialBtn.addEventListener('click', (e) => {
          e.preventDefault();
          document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' });
        });
      }
      if (quoteBtn) {
        quoteBtn.addEventListener('click', (e) => {
          e.preventDefault();
          document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' });
        });
      }
    } else if (currentView === 'about') {
      main.innerHTML = renderAbout();
    } else if (currentView === 'blog') {
      main.innerHTML = renderBlog();
    }
    document.querySelectorAll('.nav-link').forEach(link => {
      if (link.getAttribute('data-view') === currentView) link.style.color = '#0f3b2c';
      else link.style.color = '#1e293b';
    });
  }

  function setView(view, country = null) {
    currentView = view;
    if (country) currentCountry = country;
    if (view === 'home') {
      document.getElementById('countryNav').style.display = 'flex';
      document.querySelectorAll('.country-btn').forEach(btn => {
        if (btn.dataset.country === currentCountry) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    } else {
      document.getElementById('countryNav').style.display = 'none';
    }
    render();
  }

  // Event listeners
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', (e) => {
      const view = link.getAttribute('data-view');
      if (view === 'home') setView('home', currentCountry);
      else setView(view, null);
    });
  });

  document.querySelectorAll('.country-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const country = btn.dataset.country;
      currentCountry = country;
      setView('home', country);
    });
  });

  document.querySelectorAll('.footer-links a').forEach(link => {
    link.addEventListener('click', (e) => {
      const view = link.getAttribute('data-view');
      if (view === 'home') setView('home', currentCountry);
      else if (view === 'about') setView('about', null);
      else if (view === 'blog') setView('blog', null);
    });
  });

  // Initial load
  setView('home', 'au');
</script>
</body>
</html>
